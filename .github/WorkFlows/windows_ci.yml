name: Windows CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest


    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Build
      run: |
        mkdir build
        cd build
        cmake ..
        cmake --build .

    - uses: actions/upload-artifact@v4
      with:
        name: my-artifact
        path: build